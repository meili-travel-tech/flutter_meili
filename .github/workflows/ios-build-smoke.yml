name: iOS build smoke test

# Builds the example app's iOS plugin in BOTH dependency modes so neither path
# silently rots. publish.yml only does pub.dev publish + Dart analysis and never
# compiles the native iOS layer — this closes that gap (mirrors the SDK plan's
# "no CI smoke test" note in swiftpm-migration-spec.md).

on:
    pull_request:
        paths:
            - 'meili_flutter_ios/**'
            - 'meili_flutter/example/ios/**'
            - '.github/workflows/ios-build-smoke.yml'
    workflow_dispatch:

jobs:
    build:
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                # true  -> SwiftPM path (uses meili_flutter_ios/ios/meili_flutter_ios/Package.swift)
                # false -> CocoaPods path (uses the podspec) — regression guard
                swiftpm: [true, false]
        name: build (swiftpm=${{ matrix.swiftpm }})
        steps:
            - uses: actions/checkout@v4

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: '3.x'
                  channel: 'stable'

            - name: Configure Swift Package Manager
              run: flutter config --enable-swift-package-manager=${{ matrix.swiftpm }}

            - name: Pub get
              working-directory: meili_flutter/example
              run: |
                  flutter clean
                  flutter pub get

            - name: Build iOS (no codesign)
              working-directory: meili_flutter/example
              run: flutter build ios --no-codesign
